<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chesscom-theme-switcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="4" fill="url(#logo-grad)"/>
          <path d="M6 6h4v4H6zm8 0h4v4h-4zM6 14h4v4H6zm8 0h4v4h-4z" fill="#ffffff" fill-opacity="0.9"/>
          <defs>
            <linearGradient id="logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a78bfa"/>
              <stop offset="1" stop-color="#f43f5e"/>
            </linearGradient>
          </defs>
        </svg>
        <h1>Theme Switcher</h1>
      </div>
      <p class="subtitle">Artistic Board & Piece Collections</p>
    </header>

    <main class="themes-list">
      <!-- Original Theme -->
      <div class="theme-card" data-theme="original">
        <div class="theme-preview-wrapper">
          <div class="theme-preview original">
            <div class="sq light"></div>
            <div class="sq dark"></div>
            <div class="sq dark"></div>
            <div class="sq light"></div>
          </div>
          <!-- Custom Piece Preview -->
          <svg class="piece-preview-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g fill="#ffffff" stroke="#1b1b1b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
              <path d="M 30,82 L 70,82 C 70,78 68,76 64,76 L 36,76 C 32,76 30,78 30,82 Z" />
              <rect x="22" y="82" width="56" height="5" rx="2" />
              <path d="M 33,76 C 33,76 36,72 36,66 C 36,56 31,52 29,45 C 27,37 33,26 43,20 C 51,16 59,20 61,26 C 63,32 59,38 57,42 C 55,46 57,50 57,50 C 57,50 53,48 49,50 C 45,52 45,56 45,56 L 47,62 L 41,66 L 42,76 Z" />
            </g>
          </svg>
        </div>
        <div class="theme-info">
          <div class="theme-name">Original Theme</div>
          <div class="theme-desc">Chess.com Classic Style</div>
        </div>
        <div class="indicator">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
          </svg>
        </div>
      </div>

      <!-- India Theme -->
      <div class="theme-card" data-theme="india">
        <div class="theme-preview-wrapper">
          <div class="theme-preview india">
            <div class="sq light"></div>
            <div class="sq dark"></div>
            <div class="sq dark"></div>
            <div class="sq light"></div>
          </div>
          <!-- Custom Piece Preview -->
          <svg class="piece-preview-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="grad-india-w" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fffdf5" />
                <stop offset="100%" stop-color="#eedcb3" />
              </linearGradient>
            </defs>
            <g fill="url(#grad-india-w)" stroke="#d4af37" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
              <path d="M 30,82 L 70,82 C 70,78 68,76 64,76 L 36,76 C 32,76 30,78 30,82 Z" />
              <rect x="22" y="82" width="56" height="5" rx="2" />
              <path d="M 33,76 C 33,76 36,72 36,66 C 36,56 31,52 29,45 C 27,37 33,26 43,20 C 51,16 59,20 61,26 C 63,32 59,38 57,42 C 55,46 57,50 57,50 C 57,50 53,48 49,50 C 44,54 44,58 44,58 L 47,62 L 41,66 L 42,76 Z" />
              <circle cx="50" cy="62" r="3.5" fill="#d4af37" stroke="none" />
            </g>
          </svg>
        </div>
        <div class="theme-info">
          <div class="theme-name">India</div>
          <div class="theme-desc">Royal Taj Saffron & Sandalwood</div>
        </div>
        <div class="indicator">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
          </svg>
        </div>
      </div>

      <!-- Iran Theme -->
      <div class="theme-card" data-theme="iran">
        <div class="theme-preview-wrapper">
          <div class="theme-preview iran">
            <div class="sq light"></div>
            <div class="sq dark"></div>
            <div class="sq dark"></div>
            <div class="sq light"></div>
          </div>
          <!-- Custom Piece Preview -->
          <svg class="piece-preview-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="grad-iran-w" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e8faf7" />
                <stop offset="100%" stop-color="#64dfdf" />
              </linearGradient>
            </defs>
            <g fill="url(#grad-iran-w)" stroke="#e2e8f0" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
              <path d="M 30,82 L 70,82 C 70,78 68,76 64,76 L 36,76 C 32,76 30,78 30,82 Z" />
              <rect x="22" y="82" width="56" height="5" rx="2" />
              <path d="M 33,76 C 33,76 36,72 36,66 C 36,56 31,52 29,45 C 27,37 33,26 43,20 C 51,16 59,20 61,26 C 63,32 59,38 57,42 C 55,46 57,50 57,50 C 57,50 53,48 49,50 C 45,52 45,56 45,56 L 47,62 L 41,66 L 42,76 Z" />
              <polygon points="50,56 54,60 50,64 46,60" fill="#ffffff" fill-opacity="0.4" stroke="#e2e8f0" stroke-width="0.8" />
            </g>
          </svg>
        </div>
        <div class="theme-info">
          <div class="theme-name">Iran</div>
          <div class="theme-desc">Esfahan Turquoise & Silver Lapis</div>
        </div>
        <div class="indicator">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
          </svg>
        </div>
      </div>

      <!-- Russia Theme -->
      <div class="theme-card" data-theme="russia">
        <div class="theme-preview-wrapper">
          <div class="theme-preview russia">
            <div class="sq light"></div>
            <div class="sq dark"></div>
            <div class="sq dark"></div>
            <div class="sq light"></div>
          </div>
          <!-- Custom Piece Preview -->
          <svg class="piece-preview-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="grad-russia-w" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="100%" stop-color="#cbd5e0" />
              </linearGradient>
            </defs>
            <g fill="url(#grad-russia-w)" stroke="#dc2626" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
              <path d="M 30,82 L 70,82 C 70,78 68,76 64,76 L 36,76 C 32,76 30,78 30,82 Z" />
              <rect x="22" y="82" width="56" height="5" rx="2" />
              <path d="M 33,76 C 33,76 36,72 36,66 C 36,56 31,52 29,45 C 27,37 33,26 43,20 C 51,16 59,20 61,26 C 63,32 59,38 57,42 C 55,46 57,50 57,50 C 57,50 53,48 49,50 C 45,52 45,56 45,56 L 47,62 L 41,66 L 42,76 Z" />
              <polygon points="50,56 51.5,60 55,60 52,62 53.5,65 50,63 46.5,65 48,62 45,60 48.5,60" fill="#ffd700" stroke="none" />
            </g>
          </svg>
        </div>
        <div class="theme-info">
          <div class="theme-name">Russia</div>
          <div class="theme-desc">Moscow Crimson & Siberian Frost</div>
        </div>
        <div class="indicator">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
          </svg>
        </div>
      </div>
    </main>

    <footer>
      <span>Apply instantly to active Chess.com tabs</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
